# ============================================================
# Egern 配置 — DeepSeek API 用量监控小组件 v2.0
# ============================================================
# 安装方式：
#   1. 将 deepseek-usage.js 放到 Egern 脚本目录
#   2. 将此配置添加到你的主配置文件，或直接在 Egern 中按以下结构配置
#   3. 将 DEEPSEEK_API_KEY 替换为你的真实 API Key
# ============================================================

scriptings:
  - generic:
      name: "deepseek-usage"
      script_url: "deepseek-usage.js"
      timeout: 20

widgets:
  - name: "deepseek-usage"
    env:
      DEEPSEEK_API_KEY: "sk-your-deepseek-api-key-here"
